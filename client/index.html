<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDC Build Readiness Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <h1>SDC Build Readiness</h1>
    </div>
    <div class="header-center">
      <form id="project-form">
        <label for="project-input">Job #</label>
        <input type="number" id="project-input" placeholder="e.g. 1083" min="1">
        <button type="submit" id="load-btn">Load</button>
      </form>
    </div>
    <div class="header-right" id="project-info"></div>
  </header>

  <!-- Tabs -->
  <nav id="tab-bar" class="hidden">
    <button class="tab active" data-view="readiness">Build Readiness</button>
    <button class="tab" data-view="bom-tree">Full BOM Tree</button>
    <button class="tab" data-view="po-actions">PO Action List</button>
    <button class="tab" data-view="emails">Draft Emails</button>
  </nav>

  <!-- Main content -->
  <main id="content">
    <div id="welcome" class="center-message">
      <h2>Enter a job number to get started</h2>
      <p>The report pulls live data from Total ETO and shows what assemblies are ready to build.</p>
    </div>
    <div id="loading" class="center-message hidden">
      <div class="spinner"></div>
      <p>Loading project data...</p>
    </div>
    <div id="error-msg" class="center-message hidden"></div>

    <!-- Views -->
    <div id="view-readiness" class="view hidden"></div>
    <div id="view-bom-tree" class="view hidden"></div>
    <div id="view-po-actions" class="view hidden"></div>
    <div id="view-emails" class="view hidden"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
